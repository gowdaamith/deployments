apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaskapp-blue
  namespace: flaskapp
spec:
  replicas: 1
  selector: 
    matchLabels:
      app: flask-app
      version: blue
    template:
      metadata:
        lables:
          app: flask-app
          version: blue
    spec: 
    containers: 
    - name: flask
      image: gowdaamith/flakapp:v1
      ports:
      - containerPort: 5000
      readinessProbe:
        httpGet:
          path: /
          port: 5000
        initialDelaySeconds: 10
